<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trends | Sleepy Whisper</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:linear-gradient(rgba(15,15,26,0.85),rgba(15,15,26,0.92)),url('/static/images/bg4.jpg') center/cover no-repeat fixed; color:#e0e0e0; min-height:100vh; }
        .navbar { background:rgba(15,12,41,0.95); backdrop-filter:blur(10px); padding:15px 30px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(255,255,255,0.1); position:sticky; top:0; z-index:100; }
        .logo { font-size:1.3rem; font-weight:700; color:#c4b5fd; } .logo span { color:#818cf8; }
        .nav-links { display:flex; gap:22px; flex-wrap:wrap; } .nav-links a { color:#999; text-decoration:none; font-size:0.88rem; transition:color 0.3s; } .nav-links a:hover,.nav-links a.active { color:#c4b5fd; }

        .container { max-width:1100px; margin:0 auto; padding:35px 20px; }
        h1 { text-align:center; font-size:2rem; font-weight:700; background:linear-gradient(90deg,#c4b5fd,#818cf8,#60a5fa); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px; }
        .subtitle { text-align:center; color:#777; margin-bottom:35px; }

        .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:15px; margin-bottom:25px; }
        .stat-card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:20px; text-align:center; }
        .stat-number { font-size:1.8rem; font-weight:800; margin-bottom:4px; }
        .stat-label { font-size:0.75rem; color:#777; text-transform:uppercase; letter-spacing:1px; }

        .chart-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:25px; }
        .chart-card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:18px; padding:25px; }
        .chart-card.full-width { grid-column:1/-1; }
        .chart-title { font-size:0.95rem; font-weight:600; color:#c4b5fd; margin-bottom:15px; }
        .chart-container { position:relative; height:250px; }

        .history-card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:18px; padding:25px; margin-bottom:25px; }
        .history-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
        .history-title { font-size:1.05rem; font-weight:600; color:#c4b5fd; }
        .btn-clear { padding:8px 18px; background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.3); color:#f87171; border-radius:8px; font-size:0.82rem; cursor:pointer; font-family:inherit; transition:all 0.3s; }
        .btn-clear:hover { background:rgba(239,68,68,0.25); }

        table { width:100%; border-collapse:collapse; }
        th { padding:10px 14px; text-align:left; font-size:0.75rem; color:#777; text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid rgba(255,255,255,0.06); }
        td { padding:10px 14px; font-size:0.88rem; border-bottom:1px solid rgba(255,255,255,0.03); }
        .score-badge { display:inline-block; padding:3px 12px; border-radius:20px; font-size:0.82rem; font-weight:600; }
        .score-excellent { background:rgba(16,185,129,0.15); color:#10b981; }
        .score-good { background:rgba(59,130,246,0.15); color:#3b82f6; }
        .score-fair { background:rgba(245,158,11,0.15); color:#f59e0b; }
        .score-poor { background:rgba(249,115,22,0.15); color:#f97316; }
        .score-critical { background:rgba(239,68,68,0.15); color:#ef4444; }

        .empty-state { text-align:center; padding:60px 20px; }
        .empty-icon { font-size:3rem; margin-bottom:12px; }
        .empty-text { color:#777; font-size:0.95rem; margin-bottom:18px; }
        .btn-primary { display:inline-block; padding:11px 26px; background:linear-gradient(135deg,#7c3aed,#6366f1,#3b82f6); color:white; border:none; border-radius:10px; font-size:0.93rem; font-weight:600; cursor:pointer; text-decoration:none; font-family:inherit; transition:transform 0.2s; }
        .btn-primary:hover { transform:translateY(-2px); }

        .trend-indicator { display:inline-flex; align-items:center; gap:4px; font-size:0.85rem; font-weight:600; }
        .trend-up { color:#10b981; } .trend-down { color:#ef4444; } .trend-neutral { color:#888; }

        .footer { text-align:center; padding:25px; color:#555; font-size:0.82rem; margin-top:30px; }
        @media(max-width:768px){ .stats-row{grid-template-columns:repeat(2,1fr);} .chart-grid{grid-template-columns:1fr;} }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Sleepy<span>Whisper</span></div>
        <div class="nav-links">
            <a href="/">Predict</a>
            <a href="/visualization">Visualize</a>
            <a href="/history">History</a>
            <a href="/chatbot">Chatbot</a>
            <a href="/results">Models</a>
            <a href="/sleep-score">Sleep Score</a>
            <a href="/trends" class="active">Trends</a>
            <a href="/about">About</a>
        </div>
    </nav>

    <div class="container" id="mainContent">
        <h1>Sleep Health Trends</h1>
        <p class="subtitle">Track how your sleep health changes over time</p>
    </div>
    <footer class="footer">Sleepy Whisper &mdash; Sleep Disorder Forecast Using Machine Learning</footer>

    <script>
        Chart.defaults.color='#999';Chart.defaults.borderColor='rgba(255,255,255,0.06)';
        const CC={purple:'#c4b5fd',blue:'#60a5fa',green:'#10b981',yellow:'#f59e0b',red:'#ef4444',orange:'#f97316'};

        function getTrends(){return fetch('/get-trends').then(r=>r.json()).catch(()=>JSON.parse(localStorage.getItem('sleepTrends')||'[]'));}
        function clearTrends(){if(!confirm('Clear all trend data?'))return;localStorage.removeItem('sleepTrends');fetch('/clear-trends',{method:'POST'}).catch(()=>{});loadDashboard();}
        function getRatingClass(r){return 'score-'+r.toLowerCase();}
        function getRatingColor(s){return s>=85?CC.green:s>=70?CC.blue:s>=50?CC.yellow:s>=30?CC.orange:CC.red;}
        function getTrendDir(t){if(t.length<2)return{dir:'neutral',change:0};const r=t.slice(-3).reduce((a,b)=>a+b.score,0)/Math.min(t.length,3);const o=t.slice(0,Math.max(1,t.length-3)).reduce((a,b)=>a+b.score,0)/Math.max(1,t.length-3);const c=Math.round(r-o);return c>2?{dir:'up',change:c}:c<-2?{dir:'down',change:c}:{dir:'neutral',change:c};}

        async function loadDashboard(){
            const trends=await getTrends();const c=document.getElementById('mainContent');
            if(!trends||trends.length===0){c.innerHTML=`<h1>Sleep Health Trends</h1><p class="subtitle">Track how your sleep health changes over time</p><div class="empty-state"><div class="empty-icon">📊</div><p class="empty-text">No trend data yet. Use Sleep Score Calculator first!</p><a href="/sleep-score" class="btn-primary">Calculate Sleep Score</a></div>`;return;}

            const avg=Math.round(trends.reduce((a,b)=>a+b.score,0)/trends.length),best=Math.max(...trends.map(t=>t.score)),latest=trends[trends.length-1].score,tr=getTrendDir(trends);
            const tH=tr.dir==='up'?`<span class="trend-indicator trend-up">↑ +${tr.change}</span>`:tr.dir==='down'?`<span class="trend-indicator trend-down">↓ ${tr.change}</span>`:`<span class="trend-indicator trend-neutral">→ Stable</span>`;

            c.innerHTML=`<h1>Sleep Health Trends</h1><p class="subtitle">Track how your sleep health changes over time</p>
            <div class="stats-row"><div class="stat-card"><div class="stat-number" style="color:${getRatingColor(latest)}">${latest}</div><div class="stat-label">Latest Score</div></div><div class="stat-card"><div class="stat-number" style="color:${CC.purple}">${avg}</div><div class="stat-label">Average</div></div><div class="stat-card"><div class="stat-number" style="color:${CC.green}">${best}</div><div class="stat-label">Best Score</div></div><div class="stat-card"><div class="stat-number">${tH}</div><div class="stat-label">Trend (${trends.length})</div></div></div>
            <div class="chart-grid"><div class="chart-card full-width"><div class="chart-title">📈 Sleep Score Over Time</div><div class="chart-container"><canvas id="scoreChart"></canvas></div></div><div class="chart-card"><div class="chart-title">🛏️ Sleep Duration</div><div class="chart-container"><canvas id="durChart"></canvas></div></div><div class="chart-card"><div class="chart-title">😰 Stress vs Quality</div><div class="chart-container"><canvas id="sqChart"></canvas></div></div></div>
            <div class="history-card"><div class="history-header"><div class="history-title">📋 Score History</div><button class="btn-clear" onclick="clearTrends()">🗑️ Clear</button></div><table><thead><tr><th>Date</th><th>Score</th><th>Rating</th><th>Sleep</th><th>Quality</th><th>Stress</th></tr></thead><tbody>${trends.slice().reverse().map(t=>`<tr><td>${t.date}</td><td style="font-weight:700;color:${getRatingColor(t.score)}">${t.score}</td><td><span class="score-badge ${getRatingClass(t.rating)}">${t.rating}</span></td><td>${t.sleep_duration}h</td><td>${t.quality}/10</td><td>${t.stress}/10</td></tr>`).join('')}</tbody></table></div>`;

            const lb=trends.map(t=>t.date.split(' ')[0]),sc=trends.map(t=>t.score),du=trends.map(t=>t.sleep_duration),qu=trends.map(t=>t.quality),st=trends.map(t=>t.stress);
            const co={responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#999'}}},scales:{x:{ticks:{color:'#777'},grid:{color:'rgba(255,255,255,0.04)'}},y:{ticks:{color:'#777'},grid:{color:'rgba(255,255,255,0.04)'}}}};

            new Chart(document.getElementById('scoreChart'),{type:'line',data:{labels:lb,datasets:[{label:'Score',data:sc,borderColor:CC.purple,backgroundColor:'rgba(196,181,253,0.1)',fill:true,tension:0.4,pointBackgroundColor:sc.map(s=>getRatingColor(s)),pointRadius:6,borderWidth:3}]},options:{...co,scales:{...co.scales,y:{...co.scales.y,min:0,max:100}}}});
            new Chart(document.getElementById('durChart'),{type:'bar',data:{labels:lb,datasets:[{label:'Hours',data:du,backgroundColor:du.map(d=>d>=7?'rgba(16,185,129,0.6)':d>=6?'rgba(245,158,11,0.6)':'rgba(239,68,68,0.6)'),borderRadius:6}]},options:co});
            new Chart(document.getElementById('sqChart'),{type:'line',data:{labels:lb,datasets:[{label:'Quality',data:qu,borderColor:CC.green,tension:0.4,borderWidth:2},{label:'Stress',data:st,borderColor:CC.red,tension:0.4,borderWidth:2}]},options:{...co,scales:{...co.scales,y:{...co.scales.y,min:0,max:10}}}});
        }
        loadDashboard();
    </script>
</body>
</html>
