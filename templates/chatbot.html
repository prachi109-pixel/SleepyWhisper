<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleep Chatbot | Sleepy Whisper</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:linear-gradient(rgba(15,15,26,0.85),rgba(15,15,26,0.92)),url('/static/images/bg2.jpg') center/cover no-repeat fixed; color:#e0e0e0; min-height:100vh; display:flex; flex-direction:column; }
        .navbar { background:rgba(15,12,41,0.95); backdrop-filter:blur(10px); padding:15px 30px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(255,255,255,0.1); }
        .logo { font-size:1.3rem; font-weight:700; color:#c4b5fd; } .logo span { color:#818cf8; }
        .nav-links { display:flex; gap:22px; } .nav-links a { color:#999; text-decoration:none; font-size:0.88rem; transition:color 0.3s; } .nav-links a:hover,.nav-links a.active { color:#c4b5fd; }

        .chat-container {
            flex:1; max-width:750px; width:100%; margin:0 auto;
            display:flex; flex-direction:column; padding:20px;
        }
        .chat-header { text-align:center; padding:20px 0 15px; }
        .chat-header h1 {
            font-size:1.6rem; font-weight:700;
            background:linear-gradient(90deg,#c4b5fd,#818cf8);
            -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
            margin-bottom:5px;
        }
        .chat-header p { color:#777; font-size:0.88rem; }

        .messages {
            flex:1; overflow-y:auto; padding:15px 0;
            display:flex; flex-direction:column; gap:12px;
            min-height: 350px; max-height: calc(100vh - 280px);
        }

        .msg { max-width:80%; padding:12px 16px; border-radius:16px; font-size:0.9rem; line-height:1.5; animation:fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

        .msg.bot {
            align-self:flex-start;
            background:rgba(196,181,253,0.1);
            border:1px solid rgba(196,181,253,0.15);
            color:#d4d0f0;
            border-bottom-left-radius:4px;
        }
        .msg.user {
            align-self:flex-end;
            background:linear-gradient(135deg,#6366f1,#7c3aed);
            color:white;
            border-bottom-right-radius:4px;
        }
        .msg-label { font-size:0.7rem; color:#777; margin-bottom:3px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }

        .quick-tags { display:flex; flex-wrap:wrap; gap:8px; padding:10px 0; }
        .quick-tag {
            padding:6px 14px; background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.1); border-radius:20px;
            color:#aaa; font-size:0.78rem; cursor:pointer;
            font-family:inherit; transition:all 0.3s;
        }
        .quick-tag:hover { border-color:#c4b5fd; color:#c4b5fd; background:rgba(196,181,253,0.08); }

        .input-area {
            display:flex; gap:10px; padding:15px 0;
            border-top:1px solid rgba(255,255,255,0.06);
        }
        .input-area input {
            flex:1; padding:12px 16px;
            border:1px solid rgba(255,255,255,0.1); border-radius:12px;
            background:rgba(255,255,255,0.05); color:#e0e0e0;
            font-size:0.93rem; font-family:inherit; outline:none;
            transition:border 0.3s;
        }
        .input-area input:focus { border-color:#c4b5fd; }
        .input-area input::placeholder { color:#666; }
        .send-btn {
            padding:12px 24px;
            background:linear-gradient(135deg,#7c3aed,#6366f1);
            color:white; border:none; border-radius:12px;
            cursor:pointer; font-family:inherit; font-size:0.93rem;
            font-weight:600; transition:box-shadow 0.3s;
        }
        .send-btn:hover { box-shadow:0 4px 15px rgba(99,102,241,0.4); }

        .typing { display:flex; gap:4px; padding:5px 0; }
        .typing span { width:7px; height:7px; background:#c4b5fd; border-radius:50%; animation:bounce 1.2s infinite; }
        .typing span:nth-child(2) { animation-delay:0.15s; }
        .typing span:nth-child(3) { animation-delay:0.3s; }
        @keyframes bounce { 0%,80%,100% { transform:translateY(0); } 40% { transform:translateY(-8px); } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Sleepy<span>Whisper</div>
        <div class="nav-links">
            <a href="/">Predict</a>
            <a href="/visualization">Visualize</a>
            <a href="/history">History</a>
            <a href="/chatbot" class="active">Chatbot</a>
            <a href="/results">Models</a>
            <a href="/sleep-score">Sleep Score</a>
            <a href="/trends">Trends</a>
            <a href="/about">About</a>
        </div>
    </nav>

    <div class="chat-container">
        <div class="chat-header">
            <h1>Sleep Health Assistant</h1>
            <p>Ask me anything about sleep disorders, tips, and wellness</p>
        </div>

        <div class="messages" id="messages">
            <div class="msg bot">
                <div class="msg-label">Sleepy Whisper</div>
                Hello! I'm your Sleepy Whisper. Ask me about insomnia, sleep apnea, tips to improve sleep, stress management, and more!
            </div>
        </div>

        <div class="quick-tags">
            <button class="quick-tag" onclick="sendQuick('How to improve sleep?')">Improve Sleep</button>
            <button class="quick-tag" onclick="sendQuick('What is insomnia?')">Insomnia</button>
            <button class="quick-tag" onclick="sendQuick('What is sleep apnea?')">Sleep Apnea</button>
            <button class="quick-tag" onclick="sendQuick('How does stress affect sleep?')">Stress & Sleep</button>
            <button class="quick-tag" onclick="sendQuick('Best diet for sleep?')">Diet Tips</button>
            <button class="quick-tag" onclick="sendQuick('Exercise and sleep')">Exercise</button>
            <button class="quick-tag" onclick="sendQuick('Tell me about napping')">Napping</button>
            <button class="quick-tag" onclick="sendQuick('Caffeine and sleep')">Caffeine</button>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type your sleep question..." onkeypress="if(event.key==='Enter')sendMessage()">
            <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');

        function addMessage(text, type) {
            const msg = document.createElement('div');
            msg.className = 'msg ' + type;
            const label = type === 'bot' ? 'Serenova AI' : 'You';
            msg.innerHTML = `<div class="msg-label">${label}</div>${text}`;
            messagesDiv.appendChild(msg);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'msg bot';
            div.id = 'typingIndicator';
            div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            input.value = '';
            showTyping();

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                setTimeout(() => {
                    removeTyping();
                    addMessage(data.response, 'bot');
                }, 800);
            } catch (err) {
                removeTyping();
                addMessage('Sorry, something went wrong. Please try again.', 'bot');
            }
        }

        function sendQuick(text) {
            document.getElementById('userInput').value = text;
            sendMessage();
        }
    </script>
</body>
</html>
