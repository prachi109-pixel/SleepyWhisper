<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History | Sleepy Whisper</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:linear-gradient(rgba(15,15,26,0.85),rgba(15,15,26,0.92)),url('/static/images/bg4.jpg') center/cover no-repeat fixed; color:#e0e0e0; min-height:100vh; }
        .navbar { background:rgba(15,12,41,0.95); backdrop-filter:blur(10px); padding:15px 30px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(255,255,255,0.1); position:sticky; top:0; z-index:100; }
        .logo { font-size:1.3rem; font-weight:700; color:#c4b5fd; } .logo span { color:#818cf8; }
        .nav-links { display:flex; gap:22px; } .nav-links a { color:#999; text-decoration:none; font-size:0.88rem; transition:color 0.3s; } .nav-links a:hover,.nav-links a.active { color:#c4b5fd; }
        .container { max-width:1100px; margin:0 auto; padding:30px 20px; }
        h1 { text-align:center; font-size:2rem; font-weight:700; background:linear-gradient(90deg,#c4b5fd,#818cf8,#60a5fa); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px; }
        .subtitle { text-align:center; color:#777; margin-bottom:30px; }

        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .top-bar span { color:#888; font-size:0.9rem; }
        .clear-btn { padding:8px 20px; background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.3); color:#f87171; border-radius:8px; cursor:pointer; font-family:inherit; font-size:0.85rem; transition:all 0.3s; }
        .clear-btn:hover { background:rgba(239,68,68,0.25); }

        .history-card {
            background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
            border-radius:16px; padding:20px 25px; margin-bottom:15px;
            display:flex; justify-content:space-between; align-items:center;
            transition: border-color 0.3s;
        }
        .history-card:hover { border-color: rgba(196,181,253,0.3); }

        .hc-left { flex:1; }
        .hc-id { font-size:0.75rem; color:#666; margin-bottom:4px; }
        .hc-prediction { font-size:1.15rem; font-weight:600; margin-bottom:3px; }
        .hc-details { font-size:0.82rem; color:#888; line-height:1.6; }

        .hc-right { display:flex; flex-direction:column; align-items:flex-end; gap:8px; }
        .hc-time { font-size:0.78rem; color:#666; }
        .hc-model { font-size:0.75rem; color:#818cf8; background:rgba(129,140,248,0.1); padding:3px 10px; border-radius:20px; }
        .hc-download {
            padding:6px 16px; background:linear-gradient(135deg,#7c3aed,#6366f1);
            color:white; border:none; border-radius:8px; cursor:pointer;
            font-family:inherit; font-size:0.8rem; transition:box-shadow 0.3s;
        }
        .hc-download:hover { box-shadow:0 3px 12px rgba(99,102,241,0.3); }

        .empty-state { text-align:center; padding:60px 20px; color:#666; }
        .empty-state h3 { color:#888; margin-bottom:10px; font-size:1.2rem; }

        .color-healthy { color:#10b981; }
        .color-insomnia { color:#f59e0b; }
        .color-apnea { color:#ef4444; }

        .footer { text-align:center; padding:25px; color:#555; font-size:0.82rem; margin-top:30px; }

        @media (max-width:600px) {
            .history-card { flex-direction:column; align-items:flex-start; gap:12px; }
            .hc-right { align-items:flex-start; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Sleepy<span>Whisper</span></div>
        <div class="nav-links">
            <a href="/">Predict</a>
            <a href="/visualization">Visualize</a>
            <a href="/history" class="active">History</a>
            <a href="/chatbot">Chatbot</a>
            <a href="/results">Models</a>
            <a href="/sleep-score">Sleep Score</a>
            <a href="/trends">Trends</a>
            <a href="/about">About</a>
        </div>
    </nav>

    <div class="container">
        <h1>History</h1>
        <p class="subtitle">All your past sleep disorder forecasts</p>

        <div class="top-bar">
            <span id="countLabel">Loading...</span>
            <button class="clear-btn" onclick="clearHistory()">Clear All</button>
        </div>

        <div id="historyList"></div>
    </div>

    <footer class="footer">Sleepy Whisper &mdash; Sleep Disorder Forecast Using Machine Learning</footer>

    <script>
        const colorClass = { 'Healthy':'color-healthy', 'Insomnia':'color-insomnia', 'Sleep Apnea':'color-apnea' };

        async function loadHistory() {
            const res = await fetch('/api/history');
            const history = await res.json();
            const container = document.getElementById('historyList');
            const countLabel = document.getElementById('countLabel');

            if (history.length === 0) {
                countLabel.textContent = '0 analysis';
                container.innerHTML = '<div class="empty-state"><h3>No analysis yet</h3><p>Go to the Predict page to make your first prediction!</p></div>';
                return;
            }

            countLabel.textContent = history.length + ' Prediction' + (history.length > 1 ? 's' : '');
            let html = '';
            history.forEach(h => {
                const inp = h.input;
                html += `
                <div class="history-card">
                    <div class="hc-left">
                        <div class="hc-id">#${h.id}</div>
                        <div class="hc-prediction ${colorClass[h.prediction] || ''}">${h.prediction}</div>
                        <div class="hc-details">
                            ${inp.Gender}, Age ${inp.Age}, ${inp.Occupation} &bull;
                            Sleep: ${inp['Sleep Duration']}h, Quality: ${inp['Quality of Sleep']}/10 &bull;
                            Stress: ${inp['Stress Level']}/10, BP: ${inp['Blood Pressure']}
                        </div>
                    </div>
                    <div class="hc-right">
                        <div class="hc-time">${h.timestamp}</div>
                        <div class="hc-model">${h.model.includes('Gradient') ? 'GBC' : 'QDA'}</div>
                        <button class="hc-download" onclick="window.open('/download-report/${h.id}')">PDF Report</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        async function clearHistory() {
            if (!confirm('Clear all prediction history?')) return;
            await fetch('/api/clear-history', { method: 'POST' });
            loadHistory();
        }

        loadHistory();
    </script>
</body>
</html>
